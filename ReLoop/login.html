<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | ReLoop</title>

    <link rel="stylesheet" href="auth.css">
</head>

<body>

<!-- ================= NAVIGATION ================= -->

<nav>

    <div class="logo">
        <a href="index.html">♻ ReLoop</a>
    </div>

    <ul class="nav-links">

        <li><a href="index.html">Home</a></li>

        <li><a href="marketplace.html">Marketplace</a></li>

        <li><a href="signup.html">Sign Up</a></li>

    </ul>

</nav>

<!-- ================= LOGIN SECTION ================= -->

<section class="auth-container">

    <div class="auth-card">

        <h1>Welcome Back</h1>

        <p class="subtitle">
            Sign in to request materials, manage listings, and connect with businesses.
        </p>

        <form id="loginForm">
            
<div class="input-group">

    <label>Login As</label>

    <select id="role">

        <option>Business</option>

        <option>Recycler</option>

    </select>

</div>
            <div class="input-group">

                <label>Email Address</label>

                <input
                    type="email"
                    id="email"
                    placeholder="Enter your email"
                    required>

            </div>

            <div class="input-group">

                <label>Password</label>

                <input
                    type="password"
                    id="password"
                    placeholder="Enter your password"
                    required>

            </div>

            <div class="options">

                <label>

                    <input type="checkbox">

                    Remember Me

                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <button type="submit" class="auth-btn">

                Login

            </button>

        </form>

        <div class="divider">

            <span>OR</span>

        </div>

        <button class="google-btn">

            Continue with Google

        </button>

        <p class="bottom-text">

            Don't have an account?

            <a href="signup.html">

                Create One

            </a>

        </p>

    </div>

</section>

<footer>

    <p>

        © 2026 ReLoop | Sustainable Resource Sharing

    </p>

</footer>

<script src="script.js"></script>

</body>
</html>
