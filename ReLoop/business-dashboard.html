    <title>Business Dashboard | ReLoop</title>

    <link rel="stylesheet" href="dashboard.css">

</head>


<body>


<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");


if(!token){

    window.location.href = "login.html";

}


if(role !== "business"){

    window.location.href = "login.html";

}

</script>

        </li>



        <li id="listingsBtn">

        <li id="addMaterialBtn">

        </li>

        <li id="messagesBtn">

        </li>



        <li id="notificationsBtn">

        </li>



        <li id="logoutBtn">
            Logout
        </li>


    </ul>


</aside>
