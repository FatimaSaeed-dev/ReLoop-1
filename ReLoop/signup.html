<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up | ReLoop</title>
    
    <!-- SweetAlert2 CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    
    <!-- Custom Auth Stylesheet -->
    <link rel="stylesheet" href="auth.css">
</head>
<body>

<nav>
    <div class="logo">
        <a href="index.html">♻ ReLoop</a>
    </div>
    <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="marketplace.html">Marketplace</a></li>
        <li><a href="contact.html">Contact</a></li>
        <li><a href="about.html">About</a></li>
    </ul>
</nav>

<div class="auth-container">
    <div class="auth-card">
        <div class="card-pin">📌</div>
        <h1>Create Account</h1>
        <p class="subtitle">Join the ReLoop network today</p>
        <span class="crayon-highlight">Start recycling smarter!</span>

        <form id="signupForm">
            <div class="input-group">
                <label>Username</label>
                <input type="text" id="fullname" placeholder="Choose a username" required>
            </div>

            <div class="input-group">
                <label>Role</label>
                <select id="role" required>
                    <option value="recycler">Recycler</option>
                    <option value="business">Business</option>
                </select>
            </div>

            <div class="input-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Create a password" required>
            </div>

            <div class="input-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
            </div>

            <button type="submit" class="auth-btn">Sign Up</button>
        </form>

        <p class="bottom-text">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>
</div>

<footer>
    <p>© 2026 ReLoop — A cycle that never ends.</p>
</footer>

<script src="signup.js"></script>
</body>
</html>
