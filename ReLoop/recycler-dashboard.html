<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Recycler Dashboard | ReLoop</title>

<link rel="stylesheet" href="dashboard.css">

</head>


<body>

<script>
  (function () {
    const token = localStorage.getItem("token");
    let role = localStorage.getItem("role");
    if (!role && localStorage.getItem("user")) {
      try { role = JSON.parse(localStorage.getItem("user")).role; } catch (e) {}
    }

    // If not logged in or NOT a recycler, redirect away
    if (!token || role !== "recycler") {
      window.location.href = "signup.html";
    }
  })();
</script>



<aside class="sidebar">


<h2 class="logo">
♻ ReLoop
</h2>


<ul>

<li id="dashboardBtn" class="active">
Dashboard
</li>


<li id="requestsBtn">
My Requests
</li>


<li>

<button id="notificationsBtn">

    Notifications 🔔

    <span id="notificationBadge" class="badge">
        0
    </span>

</button>

</li>


<li id="messagesBtn">
Messages 💬
</li>


<li id="profileBtn">
Profile
</li>


<li id="logoutBtn">

</li>


</ul>


</aside>




<main class="main-content">


<div id="content"></div>


</main>



<script src="recycler-dashboard.js"></script>


</body>

</html>
