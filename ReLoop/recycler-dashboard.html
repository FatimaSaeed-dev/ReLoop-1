<link rel="stylesheet" href="dashboard.css">

</head>


<body>


<script>

const token = localStorage.getItem("token");
const role = localStorage.getItem("role");


if(!token){
    window.location.href="login.html";
}


if(role !== "user" && role !== "recycler"){
    window.location.href="login.html";
}


</script>
